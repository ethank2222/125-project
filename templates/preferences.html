<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Preferences</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            min-height: 80px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #5568d3;
        }
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 1px solid #667eea;
        }
        .btn-secondary:hover {
            background: #f5f5f5;
        }
        .message {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .success {
            background: #efe;
            color: #3c3;
        }
        .error {
            background: #fee;
            color: #c33;
        }
        .message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Edit Preferences</h1>
            <a href="/dashboard"><button class="btn-secondary">Back</button></a>
        </div>
        
        <div class="card">
            <div id="success" class="message success"></div>
            <div id="error" class="message error"></div>
            
            <form id="preferences-form">
                <div class="form-group">
                    <label>Fitness Goal</label>
                    <select id="intent">
                        <option value="">Select...</option>
                        <option value="lose weight">Lose Weight</option>
                        <option value="gain muscle">Gain Muscle</option>
                        <option value="maintain fitness">Maintain Fitness</option>
                        <option value="improve endurance">Improve Endurance</option>
                        <option value="rehabilitation">Rehabilitation</option>
                        <option value="general health">General Health</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Weight (lbs)</label>
                    <input type="number" id="weight" step="0.1" value="{{ user.weight or '' }}">
                </div>
                
                <div class="form-group">
                    <label>Height (inches)</label>
                    <input type="number" id="height" step="0.1" value="{{ user.height or '' }}">
                </div>
                
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age" min="1" max="120" value="{{ user.age or '' }}">
                </div>
                
                <div class="form-group">
                    <label>Gender</label>
                    <select id="gender">
                        <option value="">Prefer not to say</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Available Days per Week</label>
                    <input type="number" id="avail_days" min="1" max="7" value="{{ user.avail_days or '' }}">
                </div>
                
                <div class="form-group">
                    <label>Available Minutes per Session</label>
                    <input type="number" id="avail_mins" min="10" max="180" value="{{ user.avail_mins or '' }}">
                </div>
                
                <div class="btn-group">
                    <button type="button" class="btn-secondary" onclick="window.location.href='/dashboard'">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        if ('{{ user.intent }}') {
            document.getElementById('intent').value = '{{ user.intent }}';
        }
        if ('{{ user.gender }}') {
            document.getElementById('gender').value = '{{ user.gender }}';
        }
        
        document.getElementById('preferences-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            document.getElementById('error').classList.remove('show');
            
            const data = {
                intent: document.getElementById('intent').value,
                weight: document.getElementById('weight').value ? parseFloat(document.getElementById('weight').value) : null,
                height: document.getElementById('height').value ? parseFloat(document.getElementById('height').value) : null,
                age: document.getElementById('age').value ? parseInt(document.getElementById('age').value) : null,
                gender: document.getElementById('gender').value,
                previous_injuries: document.getElementById('previous_injuries').value.trim(),
                avail_days: document.getElementById('avail_days').value ? parseInt(document.getElementById('avail_days').value) : null,
                avail_mins: document.getElementById('avail_mins').value ? parseInt(document.getElementById('avail_mins').value) : null
            };
            
            try {
                const res = await fetch('/update_preferences', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('success').textContent = 'Saved!';
                    document.getElementById('success').classList.add('show');
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    document.getElementById('error').textContent = result.error || 'Could not save';
                    document.getElementById('error').classList.add('show');
                }
            } catch (err) {
                document.getElementById('error').textContent = 'Error';
                document.getElementById('error').classList.add('show');
            }
        });
    </script>
</body>
</html>
