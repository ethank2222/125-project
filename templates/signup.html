<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1724;
            --bg-2: #111c2b;
            --card: rgba(16, 27, 41, 0.88);
            --card-strong: rgba(19, 33, 50, 0.96);
            --text: #e6eef7;
            --muted: #92a7bd;
            --accent: #2eb5a8;
            --accent-2: #1f8a84;
            --stroke: rgba(255, 255, 255, 0.08);
            --shadow: 0 20px 60px rgba(3, 10, 25, 0.35);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 800px at 15% -10%, rgba(46, 181, 168, 0.18), transparent 60%),
                radial-gradient(900px 700px at 110% 10%, rgba(31, 138, 132, 0.22), transparent 55%),
                linear-gradient(160deg, #0f1724 0%, #142131 45%, #0f1a25 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .auth-shell {
            width: min(520px, 100%);
            z-index: 1;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }
        .logo {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            font-family: "Space Grotesk", sans-serif;
            font-weight: 700;
            color: #0b1220;
            background: linear-gradient(135deg, var(--accent) 0%, #53d0c3 100%);
            box-shadow: 0 10px 22px rgba(46, 181, 168, 0.22);
        }
        .brand-title {
            font-family: "Space Grotesk", sans-serif;
            font-size: 22px;
            margin: 0;
        }
        .brand-sub {
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .card {
            background: var(--card);
            border: 1px solid var(--stroke);
            border-radius: 18px;
            padding: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }
        h1 {
            font-family: "Space Grotesk", sans-serif;
            font-size: 20px;
            margin: 0 0 8px;
        }
        .muted {
            color: var(--muted);
            font-size: 13px;
        }
        .progress {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
            margin: 16px 0 12px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #5ad8cc);
            width: 0%;
            transition: width 0.3s ease;
        }
        .step-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 18px;
        }
        .card-step {
            display: none;
        }
        .card-step.active {
            display: block;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            color: var(--muted);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(12, 21, 34, 0.75);
            color: var(--text);
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: rgba(46, 181, 168, 0.5);
            box-shadow: 0 0 0 2px rgba(46, 181, 168, 0.2);
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        .error {
            background: rgba(255, 107, 107, 0.15);
            color: #ffb4b4;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 107, 107, 0.2);
            margin-bottom: 16px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .btn.primary {
            color: #0b1220;
            background: linear-gradient(135deg, var(--accent) 0%, #5ad8cc 100%);
            box-shadow: 0 6px 14px rgba(46, 181, 168, 0.16);
        }
        .btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(46, 181, 168, 0.22);
        }
        .btn.secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .btn.secondary:hover {
            transform: translateY(-2px);
        }
        .back-link {
            text-align: center;
            margin-top: 18px;
            color: var(--muted);
            font-size: 13px;
        }
        .back-link a {
            color: var(--accent-2);
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="brand">
            <div class="logo">E3</div>
            <div>
                <div class="brand-sub">E3 Training Console</div>
                <h1 class="brand-title">Create your profile</h1>
            </div>
        </div>

        <div class="card">
            <h1>Sign up</h1>
            <div class="muted">Answer a few quick questions to personalize your program.</div>
            <div class="progress">
                <div class="progress-bar" id="progress"></div>
            </div>
            <div class="step-info">
                <span>Step <span id="step">1</span> of 8</span>
                <span id="step-label">Account</span>
            </div>
            <div id="error" class="error"></div>

            <form id="signup-form">
                <div class="card-step active" data-step="1" data-label="Account">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn primary" onclick="nextStep()">Next</button>
                    </div>
                </div>

                <div class="card-step" data-step="2" data-label="Security">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn secondary" onclick="prevStep()">Back</button>
                        <button type="button" class="btn primary" onclick="nextStep()">Next</button>
                    </div>
                </div>

                <div class="card-step" data-step="3" data-label="Identity">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn secondary" onclick="prevStep()">Back</button>
                        <button type="button" class="btn primary" onclick="nextStep()">Next</button>
                    </div>
                </div>

                <div class="card-step" data-step="4" data-label="Goal">
                    <div class="form-group">
                        <label>Fitness Goal</label>
                        <select id="intent" required>
                            <option value="">Select...</option>
                            <option value="lose weight">Lose Weight</option>
                            <option value="gain muscle">Gain Muscle</option>
                            <option value="maintain fitness">Maintain Fitness</option>
                            <option value="improve endurance">Improve Endurance</option>
                            <option value="rehabilitation">Rehabilitation</option>
                            <option value="general health">General Health</option>
                        </select>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn secondary" onclick="prevStep()">Back</button>
                        <button type="button" class="btn primary" onclick="nextStep()">Next</button>
                    </div>
                </div>

                <div class="card-step" data-step="5" data-label="Metrics">
                    <div class="form-group">
                        <label>Weight (lbs)</label>
                        <input type="number" id="weight" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Height (inches)</label>
                        <input type="number" id="height" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" min="1" max="120">
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn secondary" onclick="prevStep()">Back</button>
                        <button type="button" class="btn primary" onclick="nextStep()">Next</button>
                    </div>
                </div>

                <div class="card-step" data-step="6" data-label="Schedule">
                    <div class="form-group">
                        <label>Available Days per Week</label>
                        <input type="number" id="avail_days" min="1" max="7" required>
                    </div>
                    <div class="form-group">
                        <label>Available Minutes per Session</label>
                        <input type="number" id="avail_mins" min="10" max="180" required>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn secondary" onclick="prevStep()">Back</button>
                        <button type="button" class="btn primary" onclick="nextStep()">Next</button>
                    </div>
                </div>

                <div class="card-step" data-step="7" data-label="Profile">
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="">Prefer not to say</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn secondary" onclick="prevStep()">Back</button>
                        <button type="button" class="btn primary" onclick="nextStep()">Next</button>
                    </div>
                </div>

                <div class="card-step" data-step="8" data-label="Notes">
                    <div class="form-group">
                        <label>Previous Injuries (optional)</label>
                        <textarea id="previous_injuries"></textarea>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn secondary" onclick="prevStep()">Back</button>
                        <button type="submit" class="btn primary">Create Account</button>
                    </div>
                </div>
            </form>

            <div class="back-link">
                <a href="/">Already have an account? Sign in</a>
            </div>
        </div>
    </div>

    <script>
        let step = 1;
        const totalSteps = 8;

        function updateProgress() {
            document.getElementById('progress').style.width = (step / totalSteps * 100) + '%';
            document.getElementById('step').textContent = step;
            const label = document.querySelector(`.card-step[data-step="${step}"]`).dataset.label;
            document.getElementById('step-label').textContent = label;
        }

        function showStep(n) {
            document.querySelectorAll('.card-step').forEach(c => c.classList.remove('active'));
            document.querySelector(`.card-step[data-step="${n}"]`).classList.add('active');
            updateProgress();
        }

        function validate() {
            const card = document.querySelector(`.card-step[data-step="${step}"]`);
            const required = card.querySelectorAll('[required]');
            for (let input of required) {
                if (!input.value.trim()) {
                    showError('Please fill in all required fields');
                    return false;
                }
            }
            if (step === 1 && document.getElementById('username').value.length < 3) {
                showError('Username must be at least 3 characters');
                return false;
            }
            if (step === 2 && document.getElementById('password').value.length < 6) {
                showError('Password must be at least 6 characters');
                return false;
            }
            return true;
        }

        function nextStep() {
            if (!validate()) return;
            if (step < totalSteps) {
                step++;
                showStep(step);
                hideError();
            }
        }

        function prevStep() {
            if (step > 1) {
                step--;
                showStep(step);
                hideError();
            }
        }

        function showError(msg) {
            const err = document.getElementById('error');
            err.textContent = msg;
            err.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        document.getElementById('signup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!validate()) return;

            const data = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                name: document.getElementById('name').value.trim(),
                intent: document.getElementById('intent').value,
                weight: document.getElementById('weight').value ? parseFloat(document.getElementById('weight').value) : null,
                height: document.getElementById('height').value ? parseFloat(document.getElementById('height').value) : null,
                age: document.getElementById('age').value ? parseInt(document.getElementById('age').value) : null,
                gender: document.getElementById('gender').value,
                previous_injuries: document.getElementById('previous_injuries').value.trim(),
                avail_days: document.getElementById('avail_days').value ? parseInt(document.getElementById('avail_days').value) : null,
                avail_mins: document.getElementById('avail_mins').value ? parseInt(document.getElementById('avail_mins').value) : null
            };

            try {
                const res = await fetch('/create_account', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    window.location.href = '/dashboard';
                } else {
                    showError(result.error || 'Could not create account');
                }
            } catch (err) {
                showError('Error');
            }
        });

        updateProgress();
    </script>
</body>
</html>
